<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contador de Histórias V7.5 — Consolidada</title>

<!--
  V7 — LIMPO (baseado na sua V6.8)

  Objetivo desta versão:
  1) Texto editado é SEMPRE a fonte da verdade.
  2) Cada etapa tem seu próprio texto (Lapidar/Estruturar/Forjar/Auditar).
  3) Modo B no botão "Próximo": ao avançar, o texto editado vai junto e preenche a próxima etapa.
  4) Botão de salvar .md por etapa (salva exatamente o texto editado daquela etapa).
  5) Código mais enxuto, com funções pequenas e nomes claros.

  Obs: mantive seu layout escuro e o estilo de comentários para você estudar sem se perder.
-->

<style>
  body{
    background:#141021;
    color:#eee;
    font-family:Arial, sans-serif;
    margin:30px;
    display:flex;
    gap:20px;
  }
  .main{flex:3;}
  .chef{flex:1;background:#1e1733;padding:15px;border-radius:10px;}
  h1{color:#b57aff;}

  textarea{
    width:100%;
    height:220px;
    background:#1a1428;
    color:#fff;
    border:1px solid #333;
    padding:10px;
    margin-bottom:15px;
  }

  button{
    background:#b57aff;
    border:none;
    padding:8px 15px;
    margin-right:8px;
    cursor:pointer;
    color:#000;
    font-weight:bold;
    border-radius:8px;
  }

  select,input{
    background:#1a1428;
    color:#fff;
    border:1px solid #333;
    padding:5px;
    margin-right:10px;
    border-radius:8px;
  }

  .progress span{margin-right:10px;cursor:pointer;}
  .active{color:#b57aff;font-weight:bold;}

  .metricas{margin-top:10px;background:#1a1428;padding:10px;border-radius:10px;}
  .hint{color:#bfb6d9;font-size:12px;margin-top:-8px;margin-bottom:10px;}
</style>
</head>

<body>

<div class="main">
  <h1>🎬 Contador de Histórias V7</h1>

  <!-- CONFIGURAÇÕES GERAIS -->
  <div>
    Motor:
    <select id="motor">
      <option value="gemini">Gemini</option>
      <option value="openai">OpenAI</option>
    </select>

    Modelo:
    <select id="modelo">
      <option value="gemini-2.5-pro">gemini-2.5-pro</option>
      <option value="gemini-2.5-flash">gemini-2.5-flash</option>
      <option value="gemini-3-flash">gemini-3-flash</option>
      <option value="gpt-4o">gpt-4o</option>
      <option value="gpt-4.1">gpt-4.1</option>
      <option value="gpt-4.1-mini">gpt-4.1-mini</option>
    </select>

    Temperatura:
    <input type="number" id="temp" value="0.7" step="0.1" min="0" max="1.2" />

    API Key:
    <input type="password" id="apikey" style="width:250px" />
  </div>

  <br />

  <!-- TÍTULO DO PROJETO (entra no nome do arquivo .md) -->
  <div>
    Título do Projeto:
    <input id="tituloProjeto" style="width:380px" placeholder="Ex: Mito da Caverna — Hoje" />
  </div>
  <div class="hint">Dica: esse título só serve para organizar os arquivos .md. Não vai para o prompt.</div>

  <!-- NAVEGAÇÃO DE ETAPAS -->
  <div class="progress">
    <span onclick="irPara('lapidar')" id="lapidar">Lapidar</span> →
    <span onclick="irPara('estruturar')" id="estruturar">Estruturar</span> →
    <span onclick="irPara('forjar')" id="forjar">Forjar</span> →
    <span onclick="irPara('auditar')" id="auditar">Auditar</span> →
    <span onclick="irPara('audio')" id="audio">Audio</span> →
    <span onclick="irPara('diretor')" id="diretor">Diretor</span>
  </div>

  <br />

  <!-- TEXTO BASE (entrada original do projeto) -->
  <textarea id="texto" placeholder="Texto base (sua história, sua ideia, seu rascunho)"></textarea>

  <!-- AÇÕES PRINCIPAIS -->
  <button onclick="executar()">Executar</button>
  <button onclick="proximo()">Próximo</button>
  <button onclick="voltar()">Voltar</button>

  <!-- Salvamento por etapa -->
  <button onclick="saveStageAsMD('lapidar')">Salvar Lapidar (.md)</button>
  <button onclick="saveStageAsMD('estruturar')">Salvar Estruturar (.md)</button>
  <button onclick="saveStageAsMD('forjar')">Salvar Forjar (.md)</button>
  <button onclick="saveStageAsMD('auditar')">Salvar Auditar (.md)</button>
  <button onclick="saveStageAsMD('audio')">Salvar Audio (.md)</button>
  <button onclick="saveStageAsMD('diretor')">Salvar Diretor (.md)</button>

  <!-- RESULTADO (EDITÁVEL) — fonte da verdade -->
  <textarea id="resultado" placeholder="Resultado (EDITÁVEL). O que você escrever aqui vira a base da próxima fase."></textarea>

  <!-- MÉTRICAS -->
  <div class="metricas">
    <strong>📊 Legibilidade (Flesch PT)</strong>
    <div id="resultadoFlesch">Ainda não analisado.</div>
    <button onclick="analisarLegibilidade()">Analisar Legibilidade</button>
  </div>
</div>


<!-- MODO CHEF -->
<div class="chef">
  <h3>👨🏾‍🍳 Modo Chef</h3>

  <label>Público-Alvo (Vocabulário)</label>
  <select id="publico">
    <option value="infantil">Infantil (6-9)</option>
    <option value="juvenil">Juvenil (10-14)</option>
    <option value="adulto">Adulto Geral</option>
    <option value="literario">Literário/Filosófico</option>
  </select>

  <br /><br />

  
  <label>Estilo de Linguagem</label>
  <select id="estiloLing">
    <option value="conversacional">Conversacional</option>
    <option value="cinematografico" selected>Cinematográfico</option>
    <option value="literario">Literário</option>
    <option value="minimalista">Minimalista</option>
  </select>

  <br /><br />

<label>Estrutura Narrativa</label>
  <select id="estrutura">
    <option value="3_atos">3 Atos</option>
    <option value="5_atos">5 Atos</option>
    <option value="jornada">Jornada do Herói</option>
    <option value="filosofica">Arquitetura Filosófica</option>
  </select>

  <br /><br />

  <label>Arquétipos</label>
  <select id="arquetipos">
    <option value="0">0</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>

  <br /><br />

  <label>Intensidade Dramática</label>
  <select id="drama">
    <option value="0">0</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>

  <br /><br />

  <label>Valor Universal</label>
  <select id="valor">
    <option value="0">0</option>
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>
</div>

<script>
  /*
    ============================================================
    ESTADO
    - Tudo que interessa fica em 'state'
    - Cada etapa guarda seu texto editado (textosPorEtapa)
    ============================================================
  */

  const etapas = ["lapidar","estruturar","forjar","auditar","audio","diretor"];

  const state = {
    etapaAtual: "lapidar",

    config:{ motor:"gemini", modelo:"", temperatura:0.7, apiKey:"" },

    chef:{ publico:"adulto", estrutura:"3_atos", estilo:"cinematografico", arquetipos:"0", drama:"0", valor:"0" },

    // Texto editado por etapa (fonte da verdade)
    textosPorEtapa:{ lapidar:"", estruturar:"", forjar:"", auditar:"", audio:"", diretor:"" },

    // Texto de ENTRADA por etapa (primeiro campo). É o que será processado ao clicar Executar.
    // Regra: por padrão, a próxima etapa recebe como entrada o texto EDITADO da etapa anterior.
    entradaPorEtapa:{ lapidar:"", estruturar:"", forjar:"", auditar:"", audio:"", diretor:"" },


    metricas:{ flesch:null, nivel:null }
  };

  /*
    ============================================================
    UTILITÁRIOS DE UI
    ============================================================
  */

  const $ = (id)=> document.getElementById(id);

  function setActiveStageUI(){
    etapas.forEach(e => $(e).classList.remove('active'));
    $(state.etapaAtual).classList.add('active');
  }

  function saveCurrentFields(){
    // #texto (entrada) e #resultado (saída) são editáveis.
    // Regra do Ateliê: a próxima fase deve usar o texto que passou pela sua mão.
    state.entradaPorEtapa[state.etapaAtual] = ($('texto').value || "");
    state.textosPorEtapa[state.etapaAtual] = ($('resultado').value || "");
  }

  function loadStageFields(etapa){
    // Carrega a ENTRADA da etapa (primeiro campo) + a SAÍDA (resultado da IA).
    // Se a entrada estiver vazia, tentamos um padrão sensato:
    // - Lapidar: usa o que você escreveu como base (entradaPorEtapa.lapidar)
    // - Outras: usam a SAÍDA da etapa anterior
    // - Audio: por padrão usa a ENTRADA de Auditar (a história), porque a SAÍDA de Auditar é relatório

    let entrada = state.entradaPorEtapa[etapa] || "";

    if(!entrada.trim()){
      const i = stageIndex(etapa);
      const prev = (i > 0) ? etapas[i-1] : null;

      if(etapa === "audio"){
        entrada = (state.entradaPorEtapa["auditar"] || "").trim()
          ? state.entradaPorEtapa["auditar"]
          : (prev ? (state.textosPorEtapa[prev] || "") : "");
      }else if(prev){
        entrada = state.textosPorEtapa[prev] || "";
      }
    }

    $('texto').value = entrada;
    $('resultado').value = state.textosPorEtapa[etapa] || "";
  }

  function stageIndex(etapa){
    return etapas.indexOf(etapa);
  }

  /*
    ============================================================
    NAVEGAÇÃO ENTRE ETAPAS

    Regras:
    - Clicar na barra de etapas (irPara) NÃO sobrescreve nada.
    - Voltar NÃO sobrescreve nada.
    - Próximo (Modo B): envia o texto editado junto e preenche a próxima etapa.
    ============================================================
  */

  function irPara(etapa){
    saveCurrentFields();

    // Se o usuário pular direto para Diretor, carregamos a história final automaticamente (se ainda estiver vazio).
    if(etapa === 'diretor'){
      const jaTem = (state.entradaPorEtapa['diretor'] || '').trim().length > 0;
      if(!jaTem){
        state.entradaPorEtapa['diretor'] = state.entradaPorEtapa['auditar'] || state.textosPorEtapa['forjar'] || '';
      }
    }

    state.etapaAtual = etapa;
    setActiveStageUI();
    loadStageFields(etapa);
    persist();
  }

  function voltar(){
    saveCurrentFields();
    const i = stageIndex(state.etapaAtual);
    if(i <= 0) return;
    state.etapaAtual = etapas[i-1];
    setActiveStageUI();
    loadStageFields(state.etapaAtual);
    persist();
  }

  function proximo(){
    // MODO B (robusto):
    // - Salva a ENTRADA e a SAÍDA da etapa atual
    // - Avança
    // - Preenche o PRIMEIRO CAMPO (#texto) da próxima etapa automaticamente
    //
    // Observação importante:
    // - Em Auditar, a SAÍDA é um relatório (não é a história).
    //   Então, ao ir de Auditar -> Audio, enviamos a ENTRADA (a história) para o Audio.

    saveCurrentFields();

    const i = stageIndex(state.etapaAtual);
    if(i >= etapas.length - 1) return;

    const current = state.etapaAtual;
    const next = etapas[i+1];

    let textoParaEnviar = state.textosPorEtapa[current] || "";

    // Exceção Auditar -> Audio: envia a história (entrada), não o relatório (saída).
    if(current === "auditar" && next === "audio"){
      textoParaEnviar = state.entradaPorEtapa["auditar"] || textoParaEnviar;
    }

    // Audio -> Diretor: o diretor precisa da HISTÓRIA (não da trilha/locução). Preferimos a história final.
    if(current === "audio" && next === "diretor"){
      textoParaEnviar = state.entradaPorEtapa["auditar"] || state.textosPorEtapa["forjar"] || textoParaEnviar;
    }

    state.etapaAtual = next;

    // Preenche a ENTRADA da próxima etapa
    state.entradaPorEtapa[next] = textoParaEnviar;

    // (Opcional) Mantém a saída antiga da próxima etapa; não sobrescrevemos automaticamente.
    // Se você quiser "limpar" a saída ao avançar, descomente:
    // state.textosPorEtapa[next] = "";

    setActiveStageUI();
    loadStageFields(next);
    $('resultado').focus();
    persist();
  }

  /*
    ============================================================
    ENTRADA PARA CADA ETAPA

    - Lapidar: usa o texto base (#texto)
    - Outras: usam o texto editado da etapa anterior
    - fallback: se anterior estiver vazio, usa o texto base
    ============================================================
  */

  function entradaParaEtapa(etapa){
    if(etapa === 'lapidar') return ($('texto').value || "");

    const i = stageIndex(etapa);
    const prev = (i > 0) ? etapas[i-1] : null;
    const prevText = prev ? (state.textosPorEtapa[prev] || "") : "";

    if(prevText.trim().length) return prevText;
    return ($('texto').value || "");
  }

  /*
    ============================================================
    PROMPT
    (mantive sua lógica, só organizei)
    ============================================================
  */

  function gerarInstrucaoLexical(publico) {
    switch (publico) {
      case "infantil":
        return "Use vocabulário simples, conte a história para crianças de 4 anos a 6 anos, frases curtas e palavras concretas.";
      case "juvenil":
        return "Use linguagem acessível, evitando termos técnicos complexos.";
      case "adulto":
        return "Use linguagem clara com liberdade moderada de abstração.";
      case "literario":
        return "Profundidade filosófica vem de clareza e imagens concretas. Use palavras compreensíveis, evite rebuscamento, adjetivação ornamental e linguagem acadêmica. Pode soar literário, mas limpo e cinematográfico.";
      default:
        return "";
    }
  }

  
  function gerarInstrucaoEstilo(estilo){
    switch(estilo){
      case "conversacional":
        return "Escreva como uma conversa íntima: simples, direto, humano. Evite floreios.";
      case "cinematografico":
        return "Escreva cinematográfico: imagens concretas, subtexto, ritmo, pausas naturais. Mostrar em vez de explicar.";
      case "literario":
        return "Escreva com densidade literária, porém clara: ideias profundas com palavras simples. Sem barroco.";
      case "minimalista":
        return "Escreva minimalista: frases curtas, poucos adjetivos, impacto por corte e silêncio.";
      default:
        return "";
    }
  }

  function regraAntiBarroco(){
    return "REGRA: profundidade filosófica NÃO é vocabulário rebuscado. Priorize clareza, imagens concretas e ritmo de narração. Evite metáforas ornamentais e linguagem acadêmica.";
  }


function gerarInstrucaoEstrutura(estrutura){
    if(estrutura === "3_atos")
      return "Reescreva o texto abaixo como um ROTEIRO em 3 atos.\n\n" +
             "- Identifique e rotule cada ato (ATO I, ATO II, ATO III).\n" +
             "- Dentro de cada ato, apresente cenas numeradas (Cena 1, Cena 2, ...).\n" +
             "- Para cada cena, inclua: breve descrição de cenário/ação e blocos de diálogo formatados como: Personagem: \"falas\".\n" +
             "- Mantenha ritmo dramático claro, indique pontos de virada e clímax.\n";

    if(estrutura === "5_atos")
      return "Reescreva o texto abaixo como um ROTEIRO em 5 atos (Exposição, Incidente, Clímax, Queda, Desfecho).\n\n" +
             "- Rotule cada ato e inclua cenas com descrições e diálogos.\n" +
             "- Realce o Incidente incitante e o Clímax com detalhes de ação e emoção.\n";

    if(estrutura === "jornada")
      return "Reescreva o texto abaixo como um ROTEIRO organizado segundo a Jornada do Herói.\n\n" +
             "- Marque etapas como Chamado, Recusa, Encontro com o Mentor, Provação, Apogeu, Retorno, etc.\n" +
             "- Para cada etapa, forneça cenas curtas com descrição e diálogo.\n";

    if(estrutura === "filosofica")
      return "Reescreva o texto abaixo como um ROTEIRO com arquitetura filosófica: apresentar uma pergunta central, explorar conflito moral, levar a uma revelação e finalizar com síntese.\n\n" +
             "- Use diálogos que expressem posições filosóficas dos personagens e cenas que ilustrem o conflito.\n";

    return "";
  }

  function readConfigFromUI(){
    state.config.motor = $('motor').value;
    state.config.modelo = $('modelo').value;
  // CORREÇÃO: campo chama-se 'temperatura' na interface
  state.config.temperatura = parseFloat($('temperatura').value);
    state.config.apiKey = $('apikey').value;
    sessionStorage.setItem('contador_apiKey_v71', state.config.apiKey);

    state.chef.publico = $('publico').value;
    state.chef.estrutura = $('estrutura').value;
    state.chef.estilo = $('estiloLing').value;
    state.chef.arquetipos = $('arquetipos').value;
    state.chef.drama = $('drama').value;
    state.chef.valor = $('valor').value;
  }

  function montarPrompt(texto){
    readConfigFromUI();

    let prompt = texto;

    // Estilo de linguagem (sempre)
    prompt = gerarInstrucaoEstilo(state.chef.estilo) + "\n\n" + prompt;

    // Limitador anti-barroco (especialmente para Literário/Filosófico)
    if(state.chef.publico === 'literario' || state.chef.estilo === 'literario'){
      prompt = regraAntiBarroco() + "\n\n" + prompt;
    }

    // Chef (Lapidar e Forjar)
    if(state.etapaAtual === "lapidar" || state.etapaAtual === "forjar"){
      let chefInstrucao = "";
      const arq = parseInt(state.chef.arquetipos || "0");
      const drama = parseInt(state.chef.drama || "0");
      const valor = parseInt(state.chef.valor || "0");

      if(arq > 0) chefInstrucao += `Aplicar arquétipos com intensidade ${arq}.\n`;
      if(drama > 0) chefInstrucao += `Intensidade dramática nível ${drama}.\n`;
      if(valor > 0) chefInstrucao += `Reforçar valor universal nível ${valor}.\n`;

      if(chefInstrucao.trim().length) prompt = chefInstrucao + "\n\n" + prompt;
    }

    // Estruturar
    if(state.etapaAtual === "estruturar"){
      prompt = gerarInstrucaoEstrutura(state.chef.estrutura) + "\n\n" + texto;
    }

    // Forjar + léxico
    if(state.etapaAtual === "forjar"){
      prompt += "\n\n" + gerarInstrucaoLexical(state.chef.publico);
    }

    // Auditar
    if(state.etapaAtual === "auditar"){
      prompt = "Avalie estrutura, emoção e clareza narrativa.\n\n" + texto;
    }


    // Audio (após Auditar)
    // Gera uma "trilha de locução": marcações de pausas, ênfases e emoção (pode virar SSML futuramente).
    if(state.etapaAtual === "audio"){
      const publico = state.chef.publico || "adulto";
      prompt =
`Você é diretor de locução (voz) para um vídeo cinematográfico no YouTube.

Tarefa:
- Transforme o TEXTO BASE em uma TRILHA DE LOCUÇÃO (narração pronta), com marcações de voz.

Regras (obrigatórias):
- NÃO avalie o texto. NÃO explique. NÃO faça comentário didático. NÃO diga "este roteiro é...".
- NÃO comece com cumprimentos ("Olá", "Prontos", etc).
- Não use títulos, tópicos ou estrutura de análise. Apenas narração.
- Preserve o sentido e a ordem do texto; você pode ajustar ritmo e pequenas quebras para locução.
- Insira marcações de pausa: [pausa 0.3], [pausa 0.7], [pausa 1.2]
- Insira marcações discretas de intenção: [sussurro], [firme], [contido], [quebra], [respira]
- Quando houver frase-chave: [ênfase]
- Evite moral explícita no final.
- Público alvo: ${publico}

Formato:
- Blocos curtos (1 a 3 frases por bloco), com respiro natural.

TEXTO BASE:
` + texto;
    }

    // Diretor (opcional)
    // Gera uma "direção visual" para vídeo: cenas, câmera, luz, som, ritmo.
    if(state.etapaAtual === "diretor"){
      prompt =
`Você é DIRETOR de um curta cinematográfico para YouTube.

TEXTO BASE: a história abaixo.

Entregue uma DIREÇÃO VISUAL em formato de lista de cenas (shotlist), com:
- CENA (1,2,3...)
- AMBIENTE (INT/EXT, hora do dia)
- AÇÃO (o que vemos)
- CÂMERA (tipo de plano, movimento, lente se fizer sentido)
- LUZ/SOMBRA (clima)
- SOM (silêncio, ruídos, respiração, trilha sugerida)
- SUBTEXTO (1 linha, sem explicar demais)

Regras:
- Não faça análise. Não elogie. Não dê aula.
- Escreva concreto, cinematográfico, com cortes e ritmo.
- Evite “vocabulário rebuscado”. Profundidade vem de clareza.

TEXTO BASE:
` + texto;
    }



    return prompt;
  }

  /*
    ============================================================
    CHAMADAS DE API (mantidas)
    ============================================================
  */

  async function chamarGemini(prompt){
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${state.config.modelo}:generateContent?key=${state.config.apiKey}`,
      {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          contents:[{parts:[{text:prompt}]}],
          generationConfig:{temperature: state.config.temperatura}
        })
      }
    );

    const data = await response.json();
    return data?.candidates?.[0]?.content?.parts?.[0]?.text || "(Sem resposta do Gemini)";
  }

  async function chamarOpenAI(prompt){
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer " + state.config.apiKey
      },
      body:JSON.stringify({
        model: state.config.modelo,
        messages:[
          {role:"system", content:"Você é um roteirista profissional."},
          {role:"user", content: prompt}
        ],
        temperature: state.config.temperatura
      })
    });

    const data = await response.json();
    return data?.choices?.[0]?.message?.content || "(Sem resposta da OpenAI)";
  }

  /*
    ============================================================
    EXECUTAR
    ============================================================
  */

  async function executar(){
    saveCurrentFields();

    const textoEntrada = $('texto').value || "";
    const prompt = montarPrompt(textoEntrada);

    $('resultado').value = "Processando...";

    let resposta = "";
    if(state.config.motor === "gemini") resposta = await chamarGemini(prompt);
    else resposta = await chamarOpenAI(prompt);

    // Resultado entra na etapa atual — e você pode editar depois.
    state.textosPorEtapa[state.etapaAtual] = resposta;
    $('resultado').value = resposta;

    persist();
  }

  /*
    ============================================================
    LEGIBILIDADE (FLESCH PT)
    ============================================================
  */

  function calcularFlesch(texto) {
    const frases = texto.split(/[.!?]+/).filter(f => f.trim().length > 0);
    const palavras = texto.split(/\s+/).filter(p => p.length > 0);

    let totalSilabas = 0;
    palavras.forEach(palavra => {
      const silabas = palavra
        .toLowerCase()
        .replace(/[^a-záéíóúâêôãõç]/g, '')
        .match(/[aeiouáéíóúâêôãõ]+/g);
      totalSilabas += silabas ? silabas.length : 1;
    });

    const ASL = palavras.length / Math.max(frases.length, 1);
    const ASW = totalSilabas / Math.max(palavras.length, 1);
    const flesch = 248.835 - (1.015 * ASL) - (84.6 * ASW);
    return flesch.toFixed(2);
  }

  function classificarFlesch(indice) {
    const n = parseFloat(indice);
    if (n >= 75) return "Muito Fácil";
    if (n >= 50) return "Médio";
    if (n >= 25) return "Difícil";
    return "Muito Difícil";
  }

  function analisarLegibilidade(){
    const texto = ($('resultado').value || "").trim();
    if(!texto.length){
      alert("Execute primeiro para gerar texto ou escreva algo no campo de resultado.");
      return;
    }

    const indice = calcularFlesch(texto);
    const nivel = classificarFlesch(indice);

    state.metricas.flesch = indice;
    state.metricas.nivel = nivel;

    $('resultadoFlesch').innerText = `Índice: ${indice} | Nível: ${nivel}`;
    persist();
  }

  /*
    ============================================================
    SALVAR .MD POR ETAPA
    - salva o texto EDITADO daquela etapa
    - nome padrão: YYYY-MM-DD_Titulo_Stage.md
    ============================================================
  */

  function todayYYYYMMDD(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }

  function slugify(s){
    return (s || 'SemTitulo')
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-zA-Z0-9]+/g,'_')
      .replace(/^_+|_+$/g,'')
      .slice(0,60);
  }

  function saveStageAsMD(stage){
    // garante que a etapa atual esteja sincronizada com o textarea
    if(stage === state.etapaAtual) saveCurrentFields();

    const text = state.textosPorEtapa[stage] || "";
    if(!text.trim().length){
      alert('Nada para salvar nesta etapa. Execute ou escreva algo no resultado.');
      return;
    }

    const titulo = slugify(($('tituloProjeto').value || '').trim());
    const filename = `${todayYYYYMMDD()}_${titulo}_${stage}.md`;

    const blob = new Blob([text], {type: 'text/markdown'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  /*
    ============================================================
    PERSISTÊNCIA LOCAL (MVP)
    - evita perder trabalho ao recarregar a página
    - NÃO salva sua API key (por segurança)
    ============================================================
  */

  const STORAGE_KEY = 'contador_historias_v7';

  function persist(){
    const payload = {
      etapaAtual: state.etapaAtual,
      config:{ motor: state.config.motor, modelo: state.config.modelo, temperatura: state.config.temperatura },
      chef: {...state.chef},
      entradaPorEtapa: {...state.entradaPorEtapa},
      textosPorEtapa: {...state.textosPorEtapa},
      textoBase: state.entradaPorEtapa.lapidar || "",
      tituloProjeto: $('tituloProjeto').value || "",
      metricas: {...state.metricas}
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  }

  function restore(){
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    try{
      const p = JSON.parse(raw);

      state.etapaAtual = p.etapaAtual || 'lapidar';
      state.config.motor = p.config?.motor || 'gemini';
      state.config.modelo = p.config?.modelo || '';
      state.config.temperatura = p.config?.temperatura ?? 0.7;

      state.chef = {...state.chef, ...(p.chef || {})};

      // Entrada por etapa (primeiro campo). Se não existir (versões antigas), usa textoBase como Lapidar.
      if(p.entradaPorEtapa) state.entradaPorEtapa = {...state.entradaPorEtapa, ...(p.entradaPorEtapa || {})};
      else if(typeof p.textoBase === 'string') state.entradaPorEtapa.lapidar = p.textoBase;

      state.textosPorEtapa = {...state.textosPorEtapa, ...(p.textosPorEtapa || {})};
      state.metricas = {...state.metricas, ...(p.metricas || {})};

      $('motor').value = state.config.motor;
      if(state.config.modelo) $('modelo').value = state.config.modelo;
  $('temperatura').value = state.config.temperatura;

      // API key: por segurança NÃO vai para localStorage.
      // Mas para não "sumir" durante uso/testes, guardamos só na sessão (sessionStorage).
      const sessionKey = sessionStorage.getItem('contador_apiKey_v71');
      if(sessionKey) $('apikey').value = sessionKey;

      $('publico').value = state.chef.publico;
      $('estrutura').value = state.chef.estrutura;
      $('estiloLing').value = state.chef.estilo || 'cinematografico';
      $('arquetipos').value = state.chef.arquetipos;
      $('drama').value = state.chef.drama;
      $('valor').value = state.chef.valor;

            $('tituloProjeto').value = p.tituloProjeto || "";

      setActiveStageUI();
      loadStageFields(state.etapaAtual);

      if(state.metricas?.flesch){
        $('resultadoFlesch').innerText = `Índice: ${state.metricas.flesch} | Nível: ${state.metricas.nivel || ''}`;
      }

    }catch(e){
      // se der erro de parse, ignora
    }
  }

  // Listener: enquanto você edita, o estado vai sendo salvo.
  $('resultado').addEventListener('input', ()=>{ saveCurrentFields(); persist(); });
  $('texto').addEventListener('input', ()=>{ saveCurrentFields(); persist(); });
  $('tituloProjeto').addEventListener('input', persist);
  ['motor','modelo','temperatura','publico','estrutura','arquetipos','drama','valor'].forEach(id=>{
    $(id).addEventListener('change', persist);
  });

  // Inicialização
  restore();
  setActiveStageUI();
  loadStageFields(state.etapaAtual);

</script>
