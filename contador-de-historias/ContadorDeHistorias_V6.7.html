<!--
    Comentários gerais sobre este arquivo:

    - Propósito: ferramenta local para gerar, lapidar, estruturar e auditar
/* ============================================================
   ESTADO GLOBAL CENTRAL (DETALHADO)

   Este objeto `state` centraliza o estado da aplicação para que as
   funções possam operar sem depender de variáveis espalhadas.

   Estrutura e propósito das principais chaves:
   - config: contém parâmetros de execução (motor, modelo, temperatura,
     apiKey). São carregados a partir dos inputs do DOM sempre que
     montamos um prompt para garantir que usamos valores atuais.
   - chef: parâmetros do 'Modo Chef' que influenciam instruções de estilo/voz.
   - history: (adicionado) armazena o texto gerado para cada etapa
     (lapidar, estruturar, forjar, auditar) — usado para exportar .md.
   - textoAtual: conteúdo retornado pelo modelo na última chamada.
   - metricas: resultados derivados (por exemplo, índice de Flesch).

   Razões para encapsular o estado:
   - Facilita testes e depuração (um único ponto de verdade).
   - Evita leituras inconsistentes do DOM em múltiplos pontos.
   - Torna simples adicionar persistência (localStorage) no futuro.

   Atenção: `apiKey` é mantida em memória apenas; o código atual não a
   persiste em disco por segurança (evite gravar chaves sensíveis).
   ============================================================ */

const state = {
        1) <style> — define aparência, layout e componentes visuais.
        2) <body>  — divide a interface em duas colunas: .main (principal)
             e .chef (configurações avançadas).
        3) <script> — toda a lógica: estado, montagem de prompt, chamadas
             HTTP aos provedores, cálculo de métricas e funcionalidades de
             exportação/salvamento.

    - Notas de segurança e privacidade:
        * Não inclua chaves de API em arquivos públicos — o campo de API Key
            é para uso local/privado apenas.
        * O recurso de salvar arquivos usa a File System Access API quando
            disponível — o usuário deve conceder permissão para a pasta.

    // Guarda o texto gerado por etapa: lapidar, estruturar, forjar, auditar
    history: {
        lapidar: "",
        estruturar: "",
        forjar: "",
        auditar: ""
    },
    textoAtual:"",
    metricas:{
        flesch:null,
        nivel:null
    }
};
   ESTÉTICA BASE: Inspirada na V2 (Layout Escuro)
   ============================================================ */

<!-- ============================================================
         COLUNA PRINCIPAL

         Comentário detalhado (Coluna Principal - .main):

         - Objetivo: agrupar os controles que o usuário usa com mais
             frequência: seleção de motor/modelo, temperatura, entrada de
             texto (textarea), navegação de etapas (lapidar/estruturar/forjar/auditar)
             e área de resultado.

         - Comportamento esperado:
             * O usuário insere um texto base na <textarea id="texto">.
             * Seleciona a etapa desejada ou navega usando Próximo/Voltar.
             * Ao clicar Executar, o código monta um prompt (ver função
                 montarPrompt) e chama o motor escolhido (Gemini ou OpenAI).
             * O retorno do modelo é exibido na <div id="resultado"> e
                 também é registrado em memória (state.history) para exportação.

         - Padrões de usabilidade:
             * Elementos dispostos em fluxo lógico: configuração → entrada → ação → saída.
             * Os controles usam estilos escuros para reduzir brilho e melhorar
                 leitura em sessões longas.

         - Limitações conhecidas:
             * A funcionalidade que envia requisições para provedores depende de
                 uma API key válida e de conectividade de rede.
             * O campo de API Key não faz nenhum tipo de criptografia local —
                 não guarde chaves sensíveis em ambientes compartilhados.

============================================================ -->

<!-- ============================================================
         COLUNA LATERAL: MODO CHEF (.chef)

         Comentário detalhado (Modo Chef):

         - Objetivo: forneça controles finos que alteram a forma como o prompt
             é construído para o modelo. Essas opções não realizam ações diretas
             por si só; elas informam a função montarPrompt que pré-pende
             instruções destinadas ao modelo.

         - Campos importantes:
             * publico (id="publico"): ajusta o vocabulário e tom (interna
                 função gerarInstrucaoLexical).
             * estrutura (id="estrutura"): troca o modo de montagem do prompt
                 para dar instruções estruturais (3 atos, Jornada, etc.).
             * arquetipos, drama, valor: intensidades que são adicionadas como
                 instruções de 'chef' durante as fases 'lapidar' e 'forjar'.

         - Observações:
             * As escolhas no Modo Chef só afetam o prompt quando as etapas
                 relevantes são selecionadas (ver montarPrompt).
             * Essas opções são cumulativas: se você marcar arquetipos=2 e drama=1,
                 o prompt incluirá ambas as instruções.

============================================================ -->

<script>

/* ============================================================
   ESTADO GLOBAL CENTRAL
   ============================================================ */

const state = {
    config:{
        motor:"gemini",
        modelo:"",
        temperatura:0.7,
        apiKey:""
    },
    chef:{
        publico:"adulto",
        estrutura:"3_atos",
        arquetipos:"0",
        drama:"0",
        valor:"0"
    },
    // Guarda o texto gerado por etapa: lapidar, estruturar, forjar, auditar
    history: {
        lapidar: "",
        estruturar: "",
        forjar: "",
        auditar: ""
    },
    // Flags que indicam se o texto daquela etapa foi editado manualmente
    edited: {
        lapidar: false,
        estruturar: false,
        forjar: false,
        auditar: false
    },
    textoAtual:"",
    metricas:{
        flesch:null,
        nivel:null
    }
};

/* ============================================================
   GERENCIAMENTO DE ETAPAS
   ============================================================ */

let etapaAtual = "lapidar"
const etapas = ["lapidar","estruturar","forjar","auditar"]

function atualizarUI(){
        /*
            Função: atualizarUI

            Objetivo:
            - Atualizar o estado visual das etapas (lapidar, estruturar, forjar, auditar)
                marcando qual delas possui a classe 'active'.

            Entradas:
            - Usa a variável global etapaAtual (string).

            Efeitos colaterais:
            - Modifica classes no DOM; não altera o estado lógico da aplicação além
                de refletir visualmente 'etapaAtual'.

            Observações de robustez:
            - Assumimos que existem elementos com ids exatamente iguais aos nomes em
                `etapas`. Se um elemento faltar, document.getElementById(...) pode retornar
                null e causar erro ao chamar classList — por isso, no futuro, podemos
                adicionar checagens de existência.
        */
        etapas.forEach(e=>{
                const el = document.getElementById(e)
                if(el) el.classList.remove("active")
        })
        const cur = document.getElementById(etapaAtual)
        if(cur) cur.classList.add("active")
    // Atualiza indicadores visuais que mostram se uma etapa foi editada
    updateEditedIndicators()
}

atualizarUI()
carregarEtapa()

function irPara(etapa){
    etapaAtual = etapa
    atualizarUI()
    carregarEtapa()
}

function proximo(){
    let i = etapas.indexOf(etapaAtual)
    if(i < etapas.length-1){
        etapaAtual = etapas[i+1]
        atualizarUI()
        carregarEtapa()
    }
}

function voltar(){
    let i = etapas.indexOf(etapaAtual)
    if(i > 0){
        etapaAtual = etapas[i-1]
        atualizarUI()
        carregarEtapa()
    }
}

/* ============================================================
   FUNÇÃO: INSTRUÇÃO LEXICAL (PÚBLICO-ALVO)
   Influencia apenas vocabulário
   ============================================================ */

function gerarInstrucaoLexical(publico) {
  switch (publico) {
    case "infantil":
      return "Use vocabulário simples, conte a história para crianças de 5 anos, frases curtas e palavras concretas.";
    case "juvenil":
      return "Use linguagem acessível, evitando termos técnicos complexos.";
    case "adulto":
      return "Use linguagem clara com liberdade moderada de abstração.";
    case "literario":
      return "Permita vocabulário sofisticado, ritmo elaborado e metáforas densas.";
    default:
      return "";
  }
}

/* ============================================================
     gerarInstrucaoEstrutura (detalhada)

     Propósito: retornar uma instrução textual curta que será adicionada ao
     prompt para orientar a forma narrativa desejada.

     Entradas: string `estrutura` com valores esperados (ex.: '3_atos').
     Saída: string curta explicando como estruturar a história.

     Nota: essa função retorna instruções prescritivas simples — a qualidade do
     resultado final dependerá de como o modelo interpreta e aplica essas
     instruções no contexto do prompt completo.
============================================================ */

/* ============================================================
   FUNÇÃO: ESTRUTURA NARRATIVA
   ============================================================ */

function gerarInstrucaoEstrutura(estrutura){

    if(estrutura === "3_atos")
        return "Estruture em 3 atos: Introdução, Conflito, Resolução."

    if(estrutura === "5_atos")
        return "Estruture em 5 atos: Exposição, Incidente, Clímax, Queda, Desfecho."

    if(estrutura === "jornada")
        return "Estruture na Jornada do Herói clássica."

    if(estrutura === "filosofica")
        return "Estruture como Arquitetura Filosófica: Pergunta, Conflito Moral, Revelação, Síntese."
}

/* ============================================================
   MONTAGEM DO PROMPT
   ============================================================ */

function montarPrompt(texto){

    /*
      montarPrompt - Monta o prompt final que será enviado ao modelo.

      Fluxo:
      1) Lê do DOM as configurações mais recentes (motor, modelo, temperatura, apiKey).
      2) Lê as opções do Modo Chef para ajustar tom/estrutura/arquetipos.
      3) Dependendo da etapaAtual (lapidar/estruturar/forjar/auditar), combina
         instruções específicas e o texto base do usuário.

      Invariantes e garantias:
      - Nunca modifica o texto original passado como argumento.
      - Retorna uma string pronta para inclusão no corpo das requisições.

      Casos de borda a considerar:
      - Se o usuário deixar campos em branco, usamos valores padrão do state.
      - 'estruturar' SUBSTITUI o prompt por uma instrução estrutural clara.
      - 'forjar' complementa com instrução lexical (vocabulário) e também
        pode receber instruções do Chef.
      - 'auditar' solicita avaliação (modo diferente — não pede geração criativa).
    */

    // 1) Atualiza configurações a partir da UI
    state.config.motor = document.getElementById("motor").value
    state.config.modelo = document.getElementById("modelo").value
    state.config.temperatura = parseFloat(document.getElementById("temperatura").value)
    state.config.apiKey = document.getElementById("apikey").value

    state.chef.publico = document.getElementById("publico").value
    state.chef.estrutura = document.getElementById("estrutura").value

    // 2) Lê controles opcionais do Modo Chef
    const arqEl = document.getElementById("arquetipos")
    const dramaEl = document.getElementById("drama")
    const valorEl = document.getElementById("valor")
    if(arqEl) state.chef.arquetipos = arqEl.value
    if(dramaEl) state.chef.drama = dramaEl.value
    if(valorEl) state.chef.valor = valorEl.value

    // prompt base: texto do usuário (não modificado)
    let prompt = texto

    // 3) Prepara instruções do Chef (quando aplicável)
    if(etapaAtual === "lapidar" || etapaAtual === "forjar"){
        let chefInstrucao = ""

        const arq = parseInt(state.chef.arquetipos || "0")
        const drama = parseInt(state.chef.drama || "0")
        const valor = parseInt(state.chef.valor || "0")

        if(arq > 0){
            // instrucao clara e direta, pensada para modelos que respondem bem a comandos
            chefInstrucao += `Aplicar arquétipos com intensidade ${arq}.\n`;
        }
        if(drama > 0){
            chefInstrucao += `Intensidade dramática nível ${drama}.\n`;
        }
        if(valor > 0){
            chefInstrucao += `Reforçar valor universal nível ${valor}.\n`;
        }

        if(chefInstrucao.trim().length > 0){
            // Pré-pendemos as instruções do chef para garantir que o modelo
            // receba o 'contexto de estilo' antes do conteúdo da história.
            prompt = chefInstrucao + "\n\n" + prompt
        }
    }

    // 4) Etapa de estruturação (substitui o prompt por instrução de estrutura)
    if(etapaAtual === "estruturar"){
        prompt = gerarInstrucaoEstrutura(state.chef.estrutura) + "\n\n" + texto
    }

    // 5) Se estivermos forjando, garantir instrução lexical adicional
    if(etapaAtual === "forjar"){
        prompt += "\n\n" + gerarInstrucaoLexical(state.chef.publico)
    }

    // 6) Auditoria: pedido de avaliação (formato objetivo)
    if(etapaAtual === "auditar"){
        prompt = "Avalie estrutura, emoção e clareza narrativa.\n\n" + texto
    }

    return prompt
}

/* ============================================================
   Função: carregarEtapa

   Objetivo: quando o usuário muda a etapa (lapidar/estruturar/forjar/auditar)
   carregamos o texto salvo em `state.history` para que o autor possa revisar
   e editar. Também atualiza `state.textoAtual`.
   ============================================================ */
function carregarEtapa(){
    const resEl = document.getElementById('resultado')
    if(!resEl) return
    const content = (state.history && state.history[etapaAtual]) ? state.history[etapaAtual] : ''
    // Evita sobrescrever enquanto o usuário estiver digitando: se o campo estiver
    // focado, não forçamos um replace. Aqui supomos troca de etapa por clique.
    resEl.value = content
    state.textoAtual = content
}

/* ============================================================
   Função: updateEditedIndicators

   Objetivo: marca visualmente na barra de progresso quais etapas foram
   editadas manualmente. Implementação minimalista: acrescenta um sufixo
   " (editado)" no label da etapa quando aplicável.
   ============================================================ */
function updateEditedIndicators(){
    const phases = ['lapidar','estruturar','forjar','auditar']
    phases.forEach(p=>{
        const el = document.getElementById(p)
        if(!el) return
        // removemos qualquer sufixo anterior para evitar duplicação
        const base = el.getAttribute('data-base') || el.innerText.replace(/ \(editado\)$/,'')
        el.setAttribute('data-base', base)
        if(state.edited && state.edited[p]){
            el.innerText = base + ' (editado)'
        } else {
            el.innerText = base
        }
    })
}

/* ============================================================
   CHAMADA GEMINI
   ============================================================ */

async function chamarGemini(prompt){

    /*
      chamarGemini

      - Propósito: realizar uma chamada HTTP ao endpoint Google Generative
        Language (Gemini) usando o modelo selecionado e retornar o texto
        gerado.

      - Entradas: prompt (string) — texto final montado por montarPrompt.
      - Saídas: string de texto (primeiro candidato). Em caso de erro de
        rede ou resposta inesperada, esta função pode lançar uma exceção.

      - Observações:
        * O endpoint e a maneira de ler a resposta assumem o formato da API
          v1beta usado aqui. Se a API mudar, será preciso ajustar parsing.
        * Não há retry automático; podemos adicionar retry/backoff para
          maior resiliência.
    */

    const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${state.config.modelo}:generateContent?key=${state.config.apiKey}`,
        {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({
                contents:[{ parts:[{ text: prompt }] }],
                generationConfig:{
                    temperature: state.config.temperatura
                }
            })
        }
    )

    // Validar o status HTTP e lançar erro claro em caso de falha
    if(!response.ok){
        const text = await response.text().catch(()=> '')
        throw new Error(`Gemini API request failed: ${response.status} ${response.statusText} - ${text}`)
    }

    const data = await response.json()

    // Estrutura esperada: data.candidates[0].content.parts[0].text
    if(!data || !data.candidates || !data.candidates[0] || !data.candidates[0].content){
        throw new Error('Resposta inesperada da Gemini: estrutura inválida')
    }

    return data.candidates[0].content.parts[0].text
}

/* ============================================================
   CHAMADA OPENAI
   ============================================================ */

async function chamarOpenAI(prompt){

    /*
      chamarOpenAI

      - Propósito: enviar o prompt ao endpoint Chat Completions da OpenAI e
        retornar o texto gerado.

      - Observações importantes:
        * Usa Authorization Bearer com a apiKey presente em state.config.
        * Espera um formato de resposta contendo data.choices[0].message.content.
        * Em produção, considere adicionar checagem de rate limits e
          tratamento de erros mais rico (retries, limites exponenciais).
    */

    const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer " + state.config.apiKey
        },
        body:JSON.stringify({
            model: state.config.modelo,
            messages:[
                { role:"system", content:"Você é um roteirista profissional." },
                { role:"user", content: prompt }
            ],
            temperature: state.config.temperatura
        })
    })

    if(!response.ok){
        const txt = await response.text().catch(()=> '')
        throw new Error(`OpenAI API error: ${response.status} ${response.statusText} - ${txt}`)
    }

    const data = await response.json()
    if(!data || !data.choices || !data.choices[0] || !data.choices[0].message){
        throw new Error('Resposta inesperada da OpenAI: estrutura inválida')
    }
    return data.choices[0].message.content
}

/* ============================================================
   EXECUTAR
   ============================================================ */

async function executar(){

    const texto = document.getElementById("texto").value
    const prompt = montarPrompt(texto)

    const resEl = document.getElementById('resultado')
    if(resEl) resEl.value = "Processando..."

    let resposta

    try{
        if(state.config.motor === "gemini")
            resposta = await chamarGemini(prompt)
        else
            resposta = await chamarOpenAI(prompt)
    }catch(err){
        // Em caso de falha na chamada ao provedor, exibimos erro amigável ao usuário
        console.error('Erro ao chamar provedor:', err)
        const resElErr = document.getElementById('resultado')
        if(resElErr) resElErr.value = 'Erro ao gerar texto: ' + (err && err.message ? err.message : err)
        return
    }

    // Atualiza estado com o texto retornado
    state.textoAtual = resposta
    // Salva o resultado na history correspondente à etapa atual para exportação
    if(state.history && etapaAtual){
        const key = etapaAtual === 'estruturar' ? 'estruturar' : etapaAtual
        state.history[key] = resposta
        // geração automática: marca como não editado (base original do modelo)
        if(state.edited) state.edited[key] = false
    }
    // Exibe no DOM (textarea editável)
    if(resEl) resEl.value = resposta
}

/* ============================================================
   SALVAR ARQUIVOS .MD
   - Usa File System Access API (showDirectoryPicker) quando disponível.
   - Cria uma pasta com o nome da história dentro da pasta escolhida (sugira selecionar Documents).
   - Escreve um arquivo `${fase}.md` para cada etapa (lapidar, estruturar, forjar, auditar).
   - Fallback: inicia downloads individuais se API não disponível.
   ============================================================ */

async function saveStoryFiles(){
    // Minimizar cliques: se o campo estiver vazio, peça nome via prompt (um único diálogo)
    const nameEl = document.getElementById('storyName')
    let storyName = nameEl && nameEl.value.trim()
    if(!storyName){
        storyName = window.prompt('Nome da história (usado como pasta/arquivo):')
        if(!storyName || !storyName.trim()){
            // Se não informado, aborta sem mensagens excessivas
            return
        }
        // preenche o campo para maior previsibilidade
        if(nameEl) nameEl.value = storyName
    }

    // Função auxiliar: salva handle em IndexedDB (structured clone permitido)
    function storeHandle(handle){
        return new Promise((res, rej)=>{
            try{
                const req = indexedDB.open('story-saver', 1)
                req.onupgradeneeded = e => { e.target.result.createObjectStore('handles') }
                req.onsuccess = e => {
                    const db = e.target.result
                    const tx = db.transaction('handles','readwrite')
                    tx.objectStore('handles').put(handle, 'dir')
                    tx.oncomplete = ()=> { db.close(); res(true) }
                    tx.onerror = ()=> { db.close(); res(false) }
                }
                req.onerror = ()=> res(false)
            }catch(err){ res(false) }
        })
    }

    function getStoredHandle(){
        return new Promise((res, rej)=>{
            try{
                const req = indexedDB.open('story-saver', 1)
                req.onupgradeneeded = e => { e.target.result.createObjectStore('handles') }
                req.onsuccess = e => {
                    const db = e.target.result
                    const tx = db.transaction('handles','readonly')
                    const get = tx.objectStore('handles').get('dir')
                    get.onsuccess = ()=> { db.close(); res(get.result || null) }
                    get.onerror = ()=> { db.close(); res(null) }
                }
                req.onerror = ()=> res(null)
            }catch(err){ res(null) }
        })
    }

    async function verifyPermission(handle){
        if(!handle) return false
        try{
            // Prefer queryPermission when available
            if(handle.queryPermission){
                const q = await handle.queryPermission({mode:'readwrite'})
                if(q === 'granted') return true
                const r = await handle.requestPermission({mode:'readwrite'})
                return r === 'granted'
            }
            return true
        }catch(e){ return false }
    }

    try{
        const phases = ['lapidar','estruturar','forjar','auditar']
        const files = {}
        phases.forEach(p=>{
            const content = (state.history && state.history[p]) ? state.history[p] : ''
            files[p + '.md'] = content
        })

        // Tenta recuperar pasta previamente escolhida
        if(window.showDirectoryPicker){
            let dirHandle = await getStoredHandle()
            let usable = false
            if(dirHandle){
                usable = await verifyPermission(dirHandle)
            }

            if(!usable){
                // Pede ao usuário escolha de pasta (só na primeira vez)
                dirHandle = await window.showDirectoryPicker({startIn: 'documents'})
                // salva para próximos usos
                await storeHandle(dirHandle)
            }

            // Cria subpasta com o nome da história
            const storyDir = await dirHandle.getDirectoryHandle(storyName, {create:true})
            for(const filename of Object.keys(files)){
                const fh = await storyDir.getFileHandle(filename, {create:true})
                const writable = await fh.createWritable()
                await writable.write(files[filename])
                await writable.close()
            }
            alert('Arquivos salvos na pasta escolhida → ' + storyName)
        }else{
            // Fallback simples: iniciar downloads individuais (não há forma de salvar automaticamente sem permissão)
            for(const filename of Object.keys(files)){
                const blob = new Blob([files[filename]], {type: 'text/markdown'})
                const url = URL.createObjectURL(blob)
                const a = document.createElement('a')
                a.href = url
                a.download = `${storyName}_${filename}`
                document.body.appendChild(a)
                a.click()
                a.remove()
                URL.revokeObjectURL(url)
            }
            alert('Downloads iniciados. Mova os arquivos para a pasta desejada (ex.: Documentos).')
        }

    }catch(err){
        console.error('Erro ao salvar arquivos:', err)
        alert('Erro ao salvar arquivos: ' + (err && err.message ? err.message : err))
    }
}

/* ============================================================
   FLESCH PORTUGUÊS (MARTINS)
   ============================================================ */

function calcularFlesch(texto) {

  const frases = texto.split(/[.!?]+/).filter(f => f.trim().length > 0);
  const palavras = texto.split(/\s+/).filter(p => p.length > 0);

  let totalSilabas = 0;

  palavras.forEach(palavra => {
    const silabas = palavra
      .toLowerCase()
      .replace(/[^a-záéíóúâêôãõç]/g, '')
      .match(/[aeiouáéíóúâêôãõ]+/g);
    totalSilabas += silabas ? silabas.length : 1;
  });

  const ASL = palavras.length / frases.length;
  const ASW = totalSilabas / palavras.length;

  const flesch = 248.835 - (1.015 * ASL) - (84.6 * ASW);

  return flesch.toFixed(2);
}

function classificarFlesch(indice) {
  if (indice >= 75) return "Muito Fácil";
  if (indice >= 50) return "Médio";
  if (indice >= 25) return "Difícil";
  return "Muito Difícil";
}
function analisarLegibilidade(){
    // Use o texto atualmente presente no textarea (pode ter sido editado)
    const resEl = document.getElementById('resultado')
    const texto = (resEl && resEl.value && resEl.value.trim()) ? resEl.value : (state.textoAtual || '')
    if(!texto || texto.trim().length === 0){
        alert("Execute primeiro para gerar texto ou escreva algo no campo de resultado.")
        return
    }

    const indice = calcularFlesch(texto)
    const nivel = classificarFlesch(indice)

    state.metricas.flesch = indice
    state.metricas.nivel = nivel

    document.getElementById("resultadoFlesch").innerText =
        `Índice: ${indice} | Nível: ${nivel}`
}

// Atalho global Ctrl/Cmd+S para salvar com um único gesto (minimiza cliques)
document.addEventListener('keydown', function(e){
    const key = e.key || ''
    const isSave = (key.toLowerCase && key.toLowerCase() === 's') || (e.keyCode === 83)
    if((e.ctrlKey || e.metaKey) && isSave){
        e.preventDefault()
        saveStoryFiles()
    }
})

(function attachResultadoListener(){

        const val = resEl.value
        state.textoAtual = val
        if(state.history && etapaAtual) state.history[etapaAtual] = val
        if(state.edited) state.edited[etapaAtual] = true
        updateEditedIndicators()
    })
})()
