<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contador de Histórias v2.0</title>

<style>
body{
    background:#141021;
    color:#eee;
    font-family:Arial, sans-serif;
    margin:30px;
    display:flex;
    gap:20px;
}

.main{
    flex:3;
}

.chef{
    flex:1;
    background:#1e1733;
    padding:15px;
    border-radius:10px;
}

h1{
    color:#b57aff;
}

textarea{
    width:100%;
    height:220px;
    background:#1a1428;
    color:#fff;
    border:1px solid #333;
    padding:10px;
    margin-bottom:15px;
}

button{
    background:#b57aff;
    border:none;
    padding:8px 15px;
    margin-right:8px;
    cursor:pointer;
    color:#000;
    font-weight:bold;
}

select,input{
    background:#1a1428;
    color:#fff;
    border:1px solid #333;
    padding:5px;
    margin-right:10px;
}

.progress span{
    margin-right:10px;
    cursor:pointer;
}

.active{
    color:#b57aff;
    font-weight:bold;
}

.output{
    margin-top:15px;
    background:#1a1428;
    padding:10px;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="main">

<h1>🎬 Contador de Histórias</h1>

<div>
Motor:
<select id="motor">
<option value="gemini">Gemini</option>
<option value="openai">OpenAI</option>
</select>

Modelo:
<select id="modelo">
<option value="gemini-3-flash">gemini-3-flash</option>
<option value="gemini-2.5-flash">gemini-2.5-flash</option>
<option value="gemini-2.5-pro">gemini-2.5-pro</option>
</select>

Temperatura:
<input type="number" id="temperatura" value="0.7" step="0.1" min="0" max="1.2">

API Key:
<input type="password" id="apikey" style="width:250px">
</div>

<br>

<div class="progress">
<span onclick="irPara('lapidar')" id="lapidar">Lapidar</span> →
<span onclick="irPara('estruturar')" id="estruturar">Estruturar</span> →
<span onclick="irPara('forjar')" id="forjar">Forjar</span> →
<span onclick="irPara('auditar')" id="auditar">Auditar</span>
</div>

<br>

<textarea id="texto"></textarea>

<button onclick="executar()">Executar</button>
<button onclick="proximo()">Próximo</button>
<button onclick="voltar()">Voltar</button>

<div class="output" id="resultado"></div>

</div>

<div class="chef">

<h3>👨🏾‍🍳 Modo Chef</h3>

<label>Arquétipos</label>
<select id="arquetipos">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>

<br><br>

<label>Intensidade Dramática</label>
<select id="drama">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>

<br><br>

<label>Valor Universal</label>
<select id="valor">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
</select>

</div>

<script>

let etapaAtual = "lapidar"
const etapas = ["lapidar","estruturar","forjar","auditar"]

function atualizarUI(){
    etapas.forEach(e=>{
        document.getElementById(e).classList.remove("active")
    })
    document.getElementById(etapaAtual).classList.add("active")
}

atualizarUI()

function irPara(etapa){
    etapaAtual = etapa
    atualizarUI()
}

function proximo(){
    let i = etapas.indexOf(etapaAtual)
    if(i < etapas.length-1){
        etapaAtual = etapas[i+1]
        atualizarUI()
    }
}

function voltar(){
    let i = etapas.indexOf(etapaAtual)
    if(i > 0){
        etapaAtual = etapas[i-1]
        atualizarUI()
    }
}

function montarPrompt(texto){

    let promptBase = texto

    if(etapaAtual === "lapidar" || etapaAtual === "forjar"){

        let chefInstrucao = ""

        let arq = document.getElementById("arquetipos").value
        let drama = document.getElementById("drama").value
        let valor = document.getElementById("valor").value

        if(arq > 0){
            chefInstrucao += `Aplicar arquétipos com intensidade ${arq}.\n`
        }

        if(drama > 0){
            chefInstrucao += `Intensidade dramática nível ${drama}.\n`
        }

        if(valor > 0){
            chefInstrucao += `Reforçar valor universal nível ${valor}.\n`
        }

        promptBase = chefInstrucao + "\n\n" + texto
    }

    if(etapaAtual === "estruturar"){
        // ==========================================================
        // ESTRUTURA NARRATIVA V8.1
        // Integração da arquitetura Prince EA
        // Hook → Conflict → Pivot → Resolve
        // ==========================================================

        const estruturar = `GANCHO PROVOCATIVO (HOOK)
Algo chama atenção imediatamente:
\${perguntaCentral}

CONFLITO (THE CONFLICT)
\${quem} deseja \${desejo}.
Mas encontra resistência: \${impede}.

VIRADA (PIVOT)
O personagem percebe que a situação pode mudar.
Momento de consciência.

RESOLUÇÃO POÉTICA (RESOLVE)
\${escolha}

Imagem final:
\${imagem}`;

        promptBase = estruturar + "\n\n" + texto;
    }

    if(etapaAtual === "auditar"){
        promptBase = "Avalie a história com notas de 0 a 10 para: Gancho, Conflito, Clareza e Impacto.\n\n" + texto
    }

    return promptBase
}

async function executar(){

    const texto = document.getElementById("texto").value
    const modelo = document.getElementById("modelo").value
    const apiKey = document.getElementById("apikey").value
    const temp = parseFloat(document.getElementById("temperatura").value)

    const prompt = montarPrompt(texto)

    document.getElementById("resultado").innerText = "Processando..."

    const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent?key=${apiKey}`,
        {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({
                contents:[{ parts:[{ text: prompt }] }],
                generationConfig:{
                    temperature: temp
                }
            })
        }
    )

    const data = await response.json()

    if(data.candidates){
        document.getElementById("resultado").innerText =
        data.candidates[0].content.parts[0].text
    }else{
        document.getElementById("resultado").innerText =
        JSON.stringify(data,null,2)
    }
}

</script>

</body>
</html>
