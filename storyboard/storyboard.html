<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Storyboard</title>

  <style>
  body {
  background: radial-gradient(circle at top, #1a001f, #000000 70%);
  color: #eaeaea;
  font-family: Arial, sans-serif;
}

/* Estilização para inputs de texto/senha */
input[type="password"], input[type="number"] {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 10px;
  border-radius: 8px;
  transition: all 0.2s ease;
}
input:focus {
  outline: none;
  border-color: #c026ff;
  box-shadow: 0 0 10px rgba(192, 38, 255, 0.4);
}

/* CARD PRINCIPAL */
.modo-diretor {
  margin: 30px auto;
  padding: 24px;
  max-width: 900px;

  background: linear-gradient(135deg, #2a0033, #0a0010);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;

  box-shadow:
    0 0 40px rgba(180, 0, 255, 0.15),
    inset 0 0 20px rgba(255,255,255,0.03);
}

/* TÍTULO */
h2 {
  color: #d26bff;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* GRID */
.diretor-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* CAMPOS */
.campo label {
  font-size: 12px;
  margin-bottom: 4px;
  color: #a855f7;
}

/* SELECT E TEXTAREA */
select, textarea {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 10px;
  border-radius: 8px;

  transition: all 0.2s ease;
}

select:focus, textarea:focus {
  outline: none;
  border-color: #c026ff;
  box-shadow: 0 0 10px rgba(192, 38, 255, 0.4);
}

select {
  background: #1a001f;
}

select option {
  background: #1a001f;
  color: #fff;
}

/* TEXTAREA */
textarea {
  min-height: 100px;
}

.bloco-cena {
  width: 100%;
}

.bloco-cena textarea {
  width: 100%;
  min-height: 140px;
  resize: vertical;
}

/* TRANSIÇÃO */
.transicao select {
  width: 100%;
  margin-top: 8px;
}

/* BOTÕES */
button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;

  background: linear-gradient(135deg, #a020f0, #d946ef);
  color: white;
  font-weight: bold;

  transition: all 0.2s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(217, 70, 239, 0.6);
}

/* CONTROLES */
.diretor-controles {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}
  </style>
</head>

<body>

<div class="modo-diretor">

  <h2>🎬 Modo Diretor</h2>

  <div class="bloco-cena">
    <label>Cena Atual</label>
    <textarea id="textoCena"></textarea>
  </div>

  <div class="diretor-grid">

    <div class="campo">
      <label>🎯 Foco da Cena</label>
      <select id="foco">
        <option value="olhos">Olhos</option>
        <option value="sorriso">Sorriso</option>
        <option value="silencio">Silêncio</option>
        <option value="distancia">Distância</option>
        <option value="movimento">Movimento</option>
      </select>
    </div>

    <div class="campo">
      <label>Espaço</label>
      <select id="espaco">
        <option value="nenhum">Nenhum</option>
        <option value="horizontal">Horizontal (confronto)</option>
        <option value="vertical">Vertical (queda/poder)</option>
        <option value="profundidade_aproxima">Profundidade (aproxima)</option>
        <option value="profundidade_afasta">Profundidade (afasta)</option>
      </select>
    </div>

    <div class="campo">
      <label>Composição</label>
      <select id="composicao">
        <option value="nenhum">Nenhum</option>
        <option value="equilibrio">Equilíbrio</option>
        <option value="desequilibrio">Desequilíbrio</option>
        <option value="fora_eixo">Fora de eixo</option>
      </select>
    </div>

    <div class="campo">
      <label>Foco Visual</label>
      <select id="focoVisual">
        <option value="estavel">Estável</option>
        <option value="instavel">Instável</option>
        <option value="fundo_apagado">Fundo apagado</option>
      </select>
    </div>

    <div class="campo">
      <label>Movimento</label>
      <select id="movimento">
        <option value="estatico">Estático</option>
        <option value="oscilante">Oscilante</option>
        <option value="aproxima">Aproxima</option>
        <option value="afasta">Afasta</option>
      </select>
    </div>

    <div class="campo">
      <label>Tempo</label>
      <select id="tempo">
        <option value="normal">Normal</option>
        <option value="lento">Lento</option>
        <option value="suspenso">Suspenso</option>
        <option value="corte_seco">Corte seco</option>
      </select>
    </div>

    <div class="campo">
      <label>TEMPO</label>
      <select id="tempoCinematico">
        <option value="nenhum">Nenhum</option>
        <option value="slow_motion">Slow Motion</option>
        <option value="freeze_frame">Freeze Frame</option>
        <option value="expansao_tempo">Expansão do Tempo</option>
      </select>
    </div>

    <div class="campo">
      <label>COMPOSIÇÃO AVANÇADA</label>
      <select id="composicaoAvancada">
        <option value="nenhum">Nenhum</option>
        <option value="pov">POV</option>
        <option value="desorientacao">Desorientação</option>
        <option value="eixo_z">Eixo Z</option>
      </select>
    </div>

    <div class="campo">
      <label>SIMBOLISMO</label>
      <select id="simbolismo">
        <option value="nenhum">Nenhum</option>
        <option value="chuva">Chuva</option>
        <option value="vento">Vento</option>
        <option value="neve">Neve</option>
        <option value="organico">Orgânico</option>
        <option value="geometrico">Geométrico</option>
      </select>
    </div>

    <div class="campo">
      <label>Duração da Cena</label>
      <select id="duracaoCena">
        <option value="curta">Curta (impacto rápido)</option>
        <option value="media">Média (respira)</option>
        <option value="longa">Longa (imersão)</option>
      </select>
    </div>

    <div class="campo">
      <label>Subtexto Visual</label>
      <select id="subtexto">
        <option value="nenhum">Neutro</option>
        <option value="contradicao">Contradição</option>
        <option value="tensao">Tensão</option>
        <option value="revelacao">Revelação</option>
      </select>
    </div>

    <div class="campo">
      <label>Escala da Cena</label>
      <select id="escalaCena">
        <option value="intimo">Íntimo (corpo)</option>
        <option value="relacional">Relacional (entre pessoas)</option>
        <option value="sistemico">Sistêmico (efeito em cadeia)</option>
      </select>
    </div>

  </div>

  <div class="transicao">
    <label>Transição</label>
    <select id="acaoDirecao">
      <option value="manter">Manter</option>
      <option value="intensificar">Intensificar</option>
      <option value="quebrar">Quebrar</option>
      <option value="nova_direcao">Nova Direção</option>
    </select>
  </div>

  <div class="diretor-controles">
    <button onclick="analisarDirecao()">Analisar</button>
    <button onclick="proximaCena()">Próxima →</button>
    <button onclick="gerarFrame()">Gerar Frame 🎬</button>
  </div>

</div>

<!-- NOVA ESTRUTURA (SUBSTITUI O BLOCO MOTOR) -->
<div class="modo-diretor">
  <h2>🎛️ Motor de IA</h2>
  <div class="diretor-grid">
    <!-- GEMINI -->
    <div class="campo">
      <label><input type="checkbox" value="gemini" checked> Gemini</label>
      <select id="modeloGemini">
        <option value="gemini-2.5-flash">Flash (barato)</option>
        <option value="gemini-2.5-pro">Pro (qualidade)</option>
      </select>
      <input type="password" id="apiGemini" placeholder="API Gemini">
    </div>
    <!-- GPT -->
    <div class="campo">
      <label><input type="checkbox" value="openai"> GPT</label>
      <select id="modeloGPT">
        <option value="gpt-4o-mini">Mini (barato)</option>
        <option value="gpt-4o">4o (equilíbrio)</option>
        <option value="gpt-4.1-mini">4.1 Mini</option>
      </select>
      <input type="password" id="apiGPT" placeholder="API GPT">
    </div>
    <!-- CLAUDE -->
    <div class="campo">
      <label><input type="checkbox" value="claude"> Claude</label>
      <select id="modeloClaude">
        <option value="claude-3-haiku-20240307">Haiku (rápido)</option>
        <option value="claude-3-sonnet-20240229">Sonnet (equilíbrio)</option>
      </select>
      <input type="password" id="apiClaude" placeholder="API Claude">
    </div>
    <!-- GLOBAL -->
    <div class="campo">
      <label>Temperatura</label>
      <input type="number" id="temperatura" value="0.7" step="0.1">
    </div>
  </div>
</div>

<div class="modo-diretor">
  <div class="bloco-cena" style="margin-top: 20px;">
    <label>Resposta da IA</label>
    <textarea id="resultadoFrame" placeholder="O frame cinematográfico aparecerá aqui..." readonly></textarea>
  </div>

</div>

<script>
let direcaoAtual = {};

function coletarDirecao(){
  return {
    foco: document.getElementById("foco").value,
    espaco: document.getElementById("espaco").value,
    composicao: document.getElementById("composicao").value,
    focoVisual: document.getElementById("focoVisual").value,
    movimento: document.getElementById("movimento").value,
    tempo: document.getElementById("tempo").value,
    tempoCinematico: document.getElementById("tempoCinematico").value,
    composicaoAvancada: document.getElementById("composicaoAvancada").value,
    simbolismo: document.getElementById("simbolismo").value,
    acao: document.getElementById("acaoDirecao").value,
    duracaoCena: document.getElementById("duracaoCena").value,
    subtexto: document.getElementById("subtexto").value,
    escalaCena: document.getElementById("escalaCena").value
  };
}

function analisarDirecao(){
  const direcao = coletarDirecao();
  console.log("Direção aplicada:", direcao);
  direcaoAtual = direcao;
}

function proximaCena(){
  console.log("Seguindo com direção:", direcaoAtual);
}

function traduzFerramentas(d){

let t = "";

if(d.tempoCinematico === "slow_motion")
t += "o tempo desacelera para intensificar a sensação\n";

if(d.tempoCinematico === "freeze_frame")
t += "o momento congela para marcar a emoção\n";

if(d.tempoCinematico === "expansao_tempo")
t += "o momento se estende para revelar o estado interno\n";

if(d.composicaoAvancada === "pov")
t += "vemos através do personagem\n";

if(d.composicaoAvancada === "desorientacao")
t += "a imagem perde orientação e estabilidade\n";

if(d.composicaoAvancada === "eixo_z")
t += "a profundidade domina a percepção de poder ou isolamento\n";

if(d.simbolismo === "chuva")
t += "elementos dissolvem o ambiente emocional\n";

if(d.simbolismo === "vento")
t += "o ambiente transmite instabilidade\n";

if(d.simbolismo === "neve")
t += "o isolamento domina a cena\n";

if(d.simbolismo === "organico")
t += "formas humanas e fluidas dominam\n";

if(d.simbolismo === "geometrico")
t += "formas rígidas e controladas dominam\n";

if(d.duracaoCena === "curta")
t += "a cena acontece rápido, sem tempo para respirar\n";

if(d.duracaoCena === "longa")
t += "a cena se estende e prende o espectador\n";

if(d.subtexto === "contradicao")
t += "algo parece bom, mas não é\n";

if(d.subtexto === "tensao")
t += "algo está prestes a romper\n";

if(d.subtexto === "revelacao")
t += "a verdade começa a aparecer\n";

if(d.escalaCena === "intimo")
t += "a cena acontece no corpo, tudo é próximo\n";

if(d.escalaCena === "relacional")
t += "a cena acontece entre pessoas, troca de tensão\n";

if(d.escalaCena === "sistemico")
t += "a ação se espalha, um gesto gera outro\n";

return t;
}

// ETAPA 2 — PROMPT DIRETOR
function montarPrompt(direcao){
  return `
Você é um Diretor Executor Cinematográfico.
CENA:
${document.getElementById("textoCena").value}
DIREÇÃO:
Foco: ${direcao.foco}
Espaço: ${direcao.espaco}
Composição: ${direcao.composicao}
Foco Visual: ${direcao.focoVisual}
Movimento: ${direcao.movimento}
Tempo: ${direcao.tempo}

RITMO DA CENA:
${direcao.duracaoCena}

ESCALA DA CENA:
${traduzFerramentas(direcao)}
REGRAS:
    • Não usar clichês
    • Não descrever cenário genérico
    • Priorizar impacto visual mobile
    • Usar apenas linguagem visual (sem explicação)
SAÍDA:
- Pressão (1 linha, sem explicar)
- Decisão (máx 3 linhas)
- Frame (máx 4 linhas)
`;
}

function getIAsSelecionadas(){
  const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
  return Array.from(checkboxes).map(cb => cb.value);
}

function getConfigIA(){
  return {
    gemini: {
      ativo: document.querySelector('input[value="gemini"]').checked,
      api: document.getElementById("apiGemini").value,
      modelo: document.getElementById("modeloGemini").value
    },
    openai: {
      ativo: document.querySelector('input[value="openai"]').checked,
      api: document.getElementById("apiGPT").value,
      modelo: document.getElementById("modeloGPT").value
    },
    claude: {
      ativo: document.querySelector('input[value="claude"]').checked,
      api: document.getElementById("apiClaude").value,
      modelo: document.getElementById("modeloClaude").value
    },
    temperatura: parseFloat(document.getElementById("temperatura").value)
  };
}

// ETAPA 3 — FUNÇÃO PRINCIPAL
async function gerarFrame(){

  const config = getConfigIA();
  const direcao = coletarDirecao();
  const prompt = montarPrompt(direcao);

  let resposta = "Nenhuma IA selecionada";

  if(config.gemini.ativo){
    resposta = await chamarGemini(prompt, config.gemini.api, config.gemini.modelo, config.temperatura);
  }

  else if(config.openai.ativo){
    resposta = await chamarOpenAI(prompt, config.openai.api, config.openai.modelo, config.temperatura);
  }

  else if(config.claude.ativo){
    resposta = await chamarClaude(prompt, config.claude.api, config.claude.modelo, config.temperatura);
  }

  document.getElementById("resultadoFrame").value = resposta;
}

// ETAPA 4 — GEMINI
async function chamarGemini(prompt, apiKey, model, temp){
  const response = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=` + apiKey,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: temp }
      })
    }
  );
  const data = await response.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "Erro Gemini";
}

// ETAPA 5 — OPENAI
async function chamarOpenAI(prompt, apiKey, model, temp){
  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + apiKey
    },
    body: JSON.stringify({
      model: model,
      messages: [
        { role: "system", content: "Você é um diretor cinematográfico." },
        { role: "user", content: prompt }
      ],
      temperature: temp,
      max_tokens: 300
    })
  });
  const data = await response.json();
  return data.choices?.[0]?.message?.content || "Erro GPT";
}

// ETAPA 6 — CLAUDE (NOVA INTEGRAÇÃO)
async function chamarClaude(prompt, apiKey, model, temp) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01"
    },
    body: JSON.stringify({
      model: model,
      max_tokens: 500,
      messages: [
        { role: "user", content: prompt }
      ],
      temperature: temp
    })
  });
  const data = await response.json();
  return data.content?.[0]?.text || "Erro Claude";
}

document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', () => {
    document.querySelectorAll('input[type="checkbox"]').forEach(other => {
      if(other !== cb) other.checked = false;
    });
  });
});

</script>

</body>
</html>
